<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinemaCam – Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #00FF41;
      text-shadow: 0 0 24px rgba(0,255,65,0.4);
      margin-bottom: 8px;
    }
    .logo span {
      color: #fff;
    }
    .tagline {
      font-size: 14px;
      letter-spacing: 0.3em;
      color: rgba(0,255,65,0.5);
      text-transform: uppercase;
      margin-bottom: 64px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      line-height: 1.8;
      margin-bottom: 48px;
    }
    .contact {
      border: 1px solid rgba(0,255,65,0.3);
      border-radius: 8px;
      padding: 32px;
      background: rgba(0,255,65,0.03);
    }
    .contact h2 {
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(0,255,65,0.6);
      margin-bottom: 16px;
    }
    .contact a {
      color: #00FF41;
      text-decoration: none;
      font-size: 18px;
      text-shadow: 0 0 12px rgba(0,255,65,0.3);
    }
    .contact a:hover {
      text-decoration: underline;
    }
    footer {
      margin-top: 64px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>Cinema</span>Cam</div>
    <div class="tagline">Shoot like a filmmaker</div>

    <h1>Support</h1>
    <p>
      CinemaCam is a cinematic camera app for iPhone.<br>
      Shoot photos and videos with 9 professional aspect ratios,<br>
      24fps frame rate, vignette, scanlines, and more.
    </p>

    <div class="contact">
      <h2>Contact</h2>
      <a href="mailto:ineed.healing.btw@gmail.com">ineed.healing.btw@gmail.com</a>
    </div>

    <footer>© 2026 ryusei date</footer>
  </div>
</body>
</html>
